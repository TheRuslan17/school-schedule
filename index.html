        }
        
        .card {
            background: white;

        .select-class {

        .history-block {

        .director-card {

        }
        
        .director-contact {
            font-size: 12px;
            color: #555;

        }
        
        .hero-name {

        }

        .notification-bell {

            display: inline-block;

            cursor: pointer;
        }
        
        .notification-badge {

            top: -8px;
            right: -8px;

            color: white;

        .exam-counter {

        @media (prefers-color-scheme: dark) {
            body {

            }
            .history-block {
                background: #0f3460;

    </style>
</head>
<body>

    <div class="tab-bar">
        <button class="tab active" data-tab="schedule">📅 Расписание</button>
        <button class="tab" data-tab="teachers">👨‍🏫 Учителя</button>
        <button class="tab" data-tab="rings">🔔 Звонки</button>
        <button class="tab" data-tab="about">🏛️ История</button>

    <script>
        const SCHEDULE_URL = "https://raw.githubusercontent.com/TheRuslan17/school-schedule/main/schedule.json";
        const REPLACEMENTS_URL = "https://raw.githubusercontent.com/TheRuslan17/school-schedule/main/replacements.json";
        
        let scheduleData = null;
        let replacementsData = null;
        let currentDay = null;
        let currentDate = null;
        let notificationPermission = false;
        
        const daysRu = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        
        // Реальные учителя школы №2
        const realTeachers = {
            "Маланин Максим Александрович": {"position": "Директор школы", "subject": "Руководство", "contact": "school2nev1@mail.ru"},
            "Говорущенко Виктория Викторовна": {"position": "Заместитель директора по ВР", "subject": "Физическая культура"},
            "Полякова Любовь Васильевна": {"position": "Учитель", "subject": "Физика, Математика"},
            "Шубина Елена Сергеевна": {"position": "Заместитель директора по методической работе", "subject": "Иностранные языки"},
            "Еремеева Наталья Александровна": {"position": "Социальный педагог", "subject": "Обществознание, История"},
            "Савельева Светлана Александровна": {"position": "Учитель", "subject": "Математика, Информатика"},
            "Кривобокова Анна Александровна": {"position": "Учитель", "subject": "Музыка, ИЗО, Биология"},
            "Рекунова Анна Евгеньевна": {"position": "Учитель", "subject": "Математика"},
            "Мусаева Светлана Салаутдиновна": {"position": "Заместитель директора по УВР", "subject": "Труд"},
            "Морозова Юлия Анатольевна": {"position": "Учитель", "subject": "История"},
            "Алмазова Ника Лаврентьевна": {"position": "Учитель", "subject": "Иностранные языки"},
            "Интс Юлия Лембитовна": {"position": "Заместитель директора по УВР", "subject": "Начальные классы"},
            "Панченко Наталья Петровна": {"position": "Учитель", "subject": "Русский язык, Литература"},
            "Репкина Анна Вячеславовна": {"position": "Учитель", "subject": "Начальные классы"},
            "Краснова Марина Ивановна": {"position": "Учитель", "subject": "Начальные классы"},
            "Красовская Наталья Ильинична": {"position": "Учитель", "subject": "Начальные классы"},
            "Кабардов Мардас Мухадинович": {"position": "Учитель", "subject": "Начальные классы"},
            "Иванова Светлана Ивановна": {"position": "Учитель", "subject": "Начальные классы"},
            "Смирнова Анна Олеговна": {"position": "Учитель", "subject": "Начальные классы"},
            "Маданова Ольга Владимировна": {"position": "Учитель", "subject": "Начальные классы"}
        };
        
        const ringsData = {
            "1": {"start": "08:30", "end": "09:15"},
            "2": {"start": "09:25", "end": "10:10"},
            "3": {"start": "10:20", "end": "11:05"},
            "4": {"start": "11:15", "end": "12:00"},
            "5": {"start": "12:10", "end": "12:55"},
            "6": {"start": "13:05", "end": "13:50"},
            "7": {"start": "14:00", "end": "14:45"}
        };
        
        // Даты экзаменов для счётчика
        const examDates = [
            { name: "ОГЭ по русскому языку", date: "2026-05-27" },
            { name: "ОГЭ по математике", date: "2026-05-30" },
            { name: "ЕГЭ по русскому языку", date: "2026-05-28" },
            { name: "ЕГЭ по математике", date: "2026-05-31" }
        ];
        
        // Проверка и запрос уведомлений
        async function initNotifications() {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                notificationPermission = permission === 'granted';
                if (notificationPermission) {
                    console.log('Уведомления разрешены');
                }
            }
        }
        
        // Отправка уведомления
        function sendNotification(title, body, tag = 'update') {
            if (notificationPermission && document.hidden) {
                new Notification(title, { body, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏫</text></svg>', tag: tag });
            }
        }
        
        // Проверка обновлений расписания и замен
        async function checkForUpdates() {
            try {
                const response = await fetch(SCHEDULE_URL + '?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    const newVersion = data.version || Object.keys(data.schedule).length + '_' + Date.now();
                    const savedVersion = localStorage.getItem('scheduleVersion');
                    if (savedVersion && savedVersion !== newVersion) {
                        sendNotification('📅 Обновление расписания', 'Расписание уроков было обновлено! Нажмите "Обновить" чтобы увидеть изменения.');
                        document.getElementById('notifyBadge').style.display = 'inline-block';
                    }
                    localStorage.setItem('scheduleVersion', newVersion);
                }
                
                const replacementsResp = await fetch(REPLACEMENTS_URL + '?t=' + Date.now());
                if (replacementsResp.ok) {
                    const newReplacements = await replacementsResp.json();
                    const savedReplacementsVersion = localStorage.getItem('replacementsVersion');
                    const newReplacementsVersion = newReplacements.version || Object.keys(newReplacements.replacements || {}).length + '_' + Date.now();
                    if (savedReplacementsVersion && savedReplacementsVersion !== newReplacementsVersion && Object.keys(newReplacements.replacements || {}).length > 0) {
                        sendNotification('🔄 Изменение замен', 'В расписании есть замены уроков! Они отмечены красным цветом.');
                        document.getElementById('notifyBadge').style.display = 'inline-block';
                    }
                    localStorage.setItem('replacementsVersion', newReplacementsVersion);
                }
            } catch (e) {
                console.log('Ошибка проверки обновлений');
            }
        }
        
        // Загрузка замен
        async function loadReplacements() {
            try {
                const response = await fetch(REPLACEMENTS_URL + '?t=' + Date.now());
                if (response.ok) {
                    replacementsData = await response.json();
                    localStorage.setItem('replacementsData', JSON.stringify(replacementsData));
                } else {
                    const saved = localStorage.getItem('replacementsData');
                    if (saved) replacementsData = JSON.parse(saved);
                }
            } catch (e) {
                const saved = localStorage.getItem('replacementsData');
                if (saved) replacementsData = JSON.parse(saved);
            }
        }
        
        // Получение замены для конкретного урока
        function getReplacement(className, date, lessonNumber) {
            if (!replacementsData || !replacementsData.replacements) return null;
            const key = `${className}_${date}_${lessonNumber}`;
            const replacement = replacementsData.replacements[key];
            if (replacement && replacement.cancelled !== undefined) {
                return replacement;
            }
            return null;
        }
        
        // Обновление счётчика экзаменов
        function updateExamCounter() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let nearestExam = null;
            let minDays = Infinity;
            
            for (const exam of examDates) {
                const examDate = new Date(exam.date);
                if (examDate >= today) {
                    const daysLeft = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));
                    if (daysLeft < minDays) {
                        minDays = daysLeft;
                        nearestExam = exam;
                    }
                }
            }
            
            const examCounterDiv = document.getElementById('examCounter');
            if (nearestExam && minDays <= 30) {
                examCounterDiv.classList.remove('hidden');
                examCounterDiv.innerHTML = `📢 До ${nearestExam.name} осталось ${minDays} ${getDaysWord(minDays)}!`;
            } else {
                examCounterDiv.classList.add('hidden');
            }
        }
        
        function getDaysWord(days) {
            if (days % 10 === 1 && days % 100 !== 11) return 'день';
            if ([2,3,4].includes(days % 10) && ![12,13,14].includes(days % 100)) return 'дня';
            return 'дней';
        }
        
        async function loadSchedule() {
            showStatus('loading', '⏳ Загрузка расписания...');
            
            try {
                const response = await fetch(SCHEDULE_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error(`Ошибка HTTP ${response.status}`);
                const data = await response.json();
                scheduleData = data;
                showStatus('success', '✅ Расписание успешно обновлено!');
                
                await loadReplacements();
                await checkForUpdates();
                
                const today = new Date();
                showScheduleForDate(today);
                updateExamCounter();
            } catch (error) {
                showStatus('error', `❌ Ошибка: ${error.message}\n\nПроверьте интернет и ссылку на GitHub`);
                scheduleData = null;
            }
        }
        
        function showStatus(type, message) {
            const container = document.getElementById('scheduleContent');
            if (type === 'loading') {
                container.innerHTML = `<div class="status loading">${message}</div>`;
            } else if (type === 'success') {
                const statusDiv = document.createElement('div');
                statusDiv.className = 'status success';
                statusDiv.textContent = message;
                container.insertBefore(statusDiv, container.firstChild);
                setTimeout(() => statusDiv.remove(), 3000);
            } else if (type === 'info') {
                const container2 = document.getElementById('scheduleContent');
                const infoDiv = document.createElement('div');
                infoDiv.className = 'status info';
                infoDiv.textContent = message;
                container2.insertBefore(infoDiv, container2.firstChild);
                setTimeout(() => infoDiv.remove(), 3000);
            } else {
                container.innerHTML = `<div class="status error">${message}</div>`;
            }
        }
        
        function getDayNameFromDate(date) {
            const dayIndex = date.getDay();
            if (dayIndex === 0 || dayIndex === 6) return null;
            return daysRu[dayIndex - 1];
        }
        
        function formatDate(date) {
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }
        
        function showScheduleForDate(date) {
            currentDate = date;
            const dayName = getDayNameFromDate(date);
            const dateStr = date.toISOString().split('T')[0];
            const displayDate = formatDate(date);
            
            if (!dayName) {
                document.getElementById('scheduleContent').innerHTML = `<div class="status info">📌 ${displayDate} — выходной день</div>`;
                return;
            }
            
            const selectedClass = document.getElementById('classSelect').value;
            
            if (!scheduleData) {
                document.getElementById('scheduleContent').innerHTML = `<div class="status error">❌ Нет данных. Нажмите «Обновить расписание»</div>`;
                return;
            }
            
            if (!scheduleData.schedule || !scheduleData.schedule[selectedClass]) {
                document.getElementById('scheduleContent').innerHTML = `<div class="status error">❌ Нет расписания для класса ${selectedClass}</div>`;
                return;
            }
            
            const lessons = scheduleData.schedule[selectedClass][dayName];
            if (!lessons || lessons.length === 0) {
                document.getElementById('scheduleContent').innerHTML = `<div class="status info">📭 Нет уроков на ${displayDate}</div>`;
                return;
            }
            
            let html = `<h3 style="margin-bottom: 15px;">📚 ${selectedClass} · ${displayDate} (${dayName})</h3>`;
            
            lessons.forEach(lesson => {
                const replacement = getReplacement(selectedClass, dateStr, lesson.number);
                let extraClass = '';
                let badgeHtml = '';
                
                if (replacement) {
                    if (replacement.cancelled) {
                        extraClass = 'cancelled';
                        badgeHtml = `<span class="cancelled-badge">ОТМЕНЁН</span>`;
                    } else {
                        extraClass = 'replacement';
                        badgeHtml = `<span class="replacement-badge">ЗАМЕНА</span>`;
                    }
                }
                
                const displaySubject = replacement && !replacement.cancelled ? (replacement.newSubject || lesson.subject) : lesson.subject;
                const displayTeacher = replacement && !replacement.cancelled ? (replacement.newTeacher || lesson.teacher) : lesson.teacher;
                const displayRoom = replacement && !replacement.cancelled ? (replacement.newRoom || lesson.room) : lesson.room;
                
                html += `
                    <div class="schedule-item ${extraClass}">
                        <div class="lesson-number">📖 ${lesson.number} урок ${badgeHtml}</div>
                        <div class="lesson-subject">${displaySubject}</div>
                        <div class="lesson-teacher">👨‍🏫 ${displayTeacher}</div>
                        <div class="lesson-teacher">🚪 Кабинет ${displayRoom}</div>
                    </div>
                `;
            });
            document.getElementById('scheduleContent').innerHTML = html;
        }
        
        function showToday() {
            if (!scheduleData) {
                showStatus('error', 'Сначала обновите расписание');
                return;
            }
            const today = new Date();
            showScheduleForDate(today);
        }
        
        function showByDatePicker() {
            const datePicker = document.getElementById('datePicker');
            if (datePicker.value) {
                const selectedDate = new Date(datePicker.value);
                showScheduleForDate(selectedDate);
            } else {
                alert('Выберите дату');
            }
        }
        
        function showAnyDay() {
            if (!scheduleData) {
                alert('Сначала обновите расписание');
                return;
            }
            const day = prompt('Введите день недели:\nПонедельник, Вторник, Среда, Четверг, Пятница, Суббота');
            if (day && daysRu.includes(day)) {
                currentDate = null;
                currentDay = day;
                const container = document.getElementById('scheduleContent');
                const selectedClass = document.getElementById('classSelect').value;
                
                if (!scheduleData.schedule || !scheduleData.schedule[selectedClass]) {
                    container.innerHTML = `<div class="status error">❌ Нет расписания для класса ${selectedClass}</div>`;
                    return;
                }
                
                const lessons = scheduleData.schedule[selectedClass][day];
                if (!lessons || lessons.length === 0) {
                    container.innerHTML = `<div class="status info">📭 Нет уроков на ${day}</div>`;
                    return;
                }
                
                let html = `<h3 style="margin-bottom: 15px;">📚 ${selectedClass} · ${day}</h3>`;
                lessons.forEach(lesson => {
                    html += `
                        <div class="schedule-item">
                            <div class="lesson-number">📖 ${lesson.number} урок</div>
                            <div class="lesson-subject">${lesson.subject}</div>
                            <div class="lesson-teacher">👨‍🏫 ${lesson.teacher}</div>
                            <div class="lesson-teacher">🚪 Кабинет ${lesson.room}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else if (day) {
                alert('Введите корректный день недели');
            }
        }
        
        function showTeachers() {
            const container = document.getElementById('teachersContent');
            let html = '';
            for (const [name, info] of Object.entries(realTeachers)) {
                html += `
                    <div class="teacher-item">
                        <div class="teacher-name">${name}</div>
                        <div class="teacher-position">${info.position || 'Учитель'}</div>
                        <div class="teacher-info">📖 Преподает: ${info.subject}</div>
                        ${info.contact ? `<div class="teacher-info">📧 ${info.contact}</div>` : ''}
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function showRings() {
            const container = document.getElementById('ringsContent');
            let html = '';
            for (const [num, times] of Object.entries(ringsData)) {
                html += `
                    <div class="ring-item">
                        <span class="ring-lesson">${num} урок</span>
                        <span class="ring-time">${times.start} - ${times.end}</span>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function showAbout() {
            const container = document.getElementById('aboutContent');
            container.innerHTML = `
                <div class="history-block">
                    <strong>🏛️ Основание:</strong> Школа основана в 1907 году купцом Иваном Васильевичем Лапиным с трёхлетним обучением для иногородних детей. Обучение было платным.
                </div>
                <div class="history-block">
                    <strong>📚 История:</strong> В 20-е годы — начальная школа, затем семилетняя. В 30-е годы — Фабричное заводское училище. В 1937–1938 гг. создана средняя школа №2.
                </div>
                <div class="history-block">
                    <strong>🏗️ Здание:</strong> В 1936 году построено новое здание по ул. Шевченко, 2. В годы войны школа была военным госпиталем. При отступлении немцы сожгли школу, восстановлена в 1950 году.
                </div>
                <div class="hero-name">
                    <h4>⭐ Имя школы</h4>
                    <p>Носит имя лётчика-космонавта, Героя Российской Федерации<br>Олега Ивановича Скрипочки</p>
                </div>
                <div class="director-card">
                    <div class="director-name">👨‍💼 Директор: Маланин Максим Александрович</div>
                    <div class="director-contact">📞 Телефон: +7 (86554) 2-14-07</div>
                    <div class="director-contact">📧 Email: school2nev1@mail.ru</div>
                    <div class="director-contact">🕐 Приём: четверг 14:00-16:00</div>
                </div>
            `;
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            
            document.getElementById('scheduleCard').classList.add('hidden');
            document.getElementById('teachersCard').classList.add('hidden');
            document.getElementById('ringsCard').classList.add('hidden');
            document.getElementById('aboutCard').classList.add('hidden');
            
            if (tab === 'schedule') {
                document.getElementById('scheduleCard').classList.remove('hidden');
                if (currentDate && scheduleData) showScheduleForDate(currentDate);
                else if (currentDay && scheduleData) showAnyDay();
                else if (scheduleData) showToday();
            } else if (tab === 'teachers') {
                document.getElementById('teachersCard').classList.remove('hidden');
                showTeachers();
            } else if (tab === 'rings') {
                document.getElementById('ringsCard').classList.remove('hidden');
                showRings();
            } else if (tab === 'about') {
                document.getElementById('aboutCard').classList.remove('hidden');
                showAbout();
            }
        }
        
        // Обработчики
        document.getElementById('updateBtn').addEventListener('click', loadSchedule);
        document.getElementById('todayBtn').addEventListener('click', showToday);
        document.getElementById('anyDayBtn').addEventListener('click', showAnyDay);
        document.getElementById('dateBtn').addEventListener('click', showByDatePicker);
        document.getElementById('aboutBtn').addEventListener('click', () => switchTab('about'));
        document.getElementById('classSelect').addEventListener('change', () => {
            if (currentDate && scheduleData) showScheduleForDate(currentDate);
            else if (currentDay && scheduleData) showAnyDay();
        });
        document.getElementById('notifyBell').addEventListener('click', () => {
            document.getElementById('notifyBadge').style.display = 'none';
        });
        
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        
        // Установка сегодняшней даты в datePicker
        const todayDate = new Date();
        const yyyy = todayDate.getFullYear();
        const mm = String(todayDate.getMonth() + 1).padStart(2, '0');
        const dd = String(todayDate.getDate()).padStart(2, '0');
        document.getElementById('datePicker').value = `${yyyy}-${mm}-${dd}`;
        
        // Инициализация
        initNotifications();
        loadSchedule();
        
        setInterval(() => {
            checkForUpdates();
            loadReplacements();
            if (currentDate && document.getElementById('scheduleCard').classList.contains('hidden') === false) {
                showScheduleForDate(currentDate);
            }
        }, 300000);
    </script>
</body>
